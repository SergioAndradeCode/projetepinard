<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond carré arrondi -->
  <rect width="48" height="48" rx="12" fill="#1E4A8C"/>

  <!-- Lettre T stylisée — barre horizontale -->
  <rect x="8" y="11" width="32" height="7" rx="3.5" fill="white"/>

  <!-- Lettre T — tige verticale -->
  <rect x="20.5" y="17" width="7" height="20" rx="3.5" fill="white"/>

  <!-- Accent : chevron montant (symbolise la progression du taux OETH) -->
